name: Scrape ESPN Brackets

on:
  schedule:
    # Every hour, 4pm-5am UTC (covers noon-1am ET during game windows)
    # Hourly to stay within Vercel's 100 deploys/day limit
    - cron: '0 16-23,0-5 * 3-4 *'
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ESPN_GROUP_ID: 'f2683f8e-fbba-4625-9188-84a820659e90'
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: python -m scraper.scrape

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: update dashboard data [skip ci]"
            git push
          fi

      - name: Trigger Vercel redeploy
        if: success()
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Triggered Vercel redeploy"
          else
            echo "VERCEL_DEPLOY_HOOK not set, skipping redeploy"
          fi
