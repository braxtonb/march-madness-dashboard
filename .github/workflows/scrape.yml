name: Scrape ESPN Brackets

on:
  schedule:
    # Every hour during game windows + once in the morning for overnight updates
    # 4pm-5am UTC = noon-1am ET (covers all game times + late-night results)
    # 2pm UTC = 10am ET (morning catch-up for overnight scores)
    - cron: '0 14,16-23,0-5 * 3-4 *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ESPN_GROUP_ID: 'f2683f8e-fbba-4625-9188-84a820659e90'
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: python -m scraper.scrape

      - name: Commit and push data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/braxtonb/march-madness-dashboard.git
          cp public/data.json public/data.backup.json
          git add public/data.json public/data.backup.json
          git commit -m "data: update dashboard data [skip ci]"
          git pull --rebase origin main || true
          git push
